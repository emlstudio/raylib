name: Vulkan Backend

# Builds libraylib + rlvk-shdc with GRAPHICS=GRAPHICS_API_VULKAN on every
# desktop platform. Runs the rlvk-shdc fixture suite on each. The full
# example audit and SwiftShader-based runtime tests run on Linux only
# (where SwiftShader is easiest to install).

on:
  push:
    branches: [vulcan, master]
    paths:
      - 'src/rlvk*.h'
      - 'src/Makefile'
      - 'src/shaders/vulkan/**'
      - 'src/tools/**'
      - 'examples/**'
      - '.github/workflows/vulkan.yml'
  pull_request:
    branches: [vulcan, master]
    paths:
      - 'src/rlvk*.h'
      - 'src/Makefile'
      - 'src/shaders/vulkan/**'
      - 'src/tools/**'
      - 'examples/**'
      - '.github/workflows/vulkan.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────────
      # Vulkan SDK / toolchain
      # ──────────────────────────────────────────────────────────────────
      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libvulkan-dev vulkan-tools glslc \
            mesa-vulkan-drivers \
            libwayland-dev libxkbcommon-dev \
            libxrandr-dev libxinerama-dev libxi-dev libxcursor-dev

      - name: Install Vulkan SDK (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install molten-vk shaderc glslang
          # Surface VULKAN_SDK so the Makefile picks up include / lib paths.
          # Homebrew installs molten-vk under /opt/homebrew on Apple Silicon
          # and /usr/local on Intel; both expose vulkan headers at $PREFIX/include.
          PREFIX="$(brew --prefix molten-vk)"
          echo "VULKAN_SDK=$PREFIX" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$PREFIX/lib" >> $GITHUB_ENV

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.0
        with:
          vulkan-query-version: 1.3.268.0
          vulkan-components: Vulkan-Headers,Vulkan-Loader,Glslang
          vulkan-use-cache: true

      # ──────────────────────────────────────────────────────────────────
      # Build: libraylib + rlvk-shdc + tool fixtures
      # ──────────────────────────────────────────────────────────────────
      - name: Build libraylib (Vulkan)
        shell: bash
        run: make -C src GRAPHICS=GRAPHICS_API_VULKAN PLATFORM=PLATFORM_DESKTOP

      - name: Build rlvk-shdc
        shell: bash
        run: make -C src/tools

      - name: rlvk-shdc fixture tests
        shell: bash
        run: make -C src/tools test

      # ──────────────────────────────────────────────────────────────────
      # Example audit (Linux only — script uses POSIX sh + GNU make heavy)
      # ──────────────────────────────────────────────────────────────────
      - name: Example audit
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Ignore non-zero exit (matrix has BUILD_FAILs in some configs).
          sh src/tools/audit_examples.sh || true

      - name: Upload example audit artifacts
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-example-audit
          path: |
            docs/vulkan_example_matrix.md
            build/example_audit/

      # ──────────────────────────────────────────────────────────────────
      # SwiftShader runtime tests (Linux only — bring SwiftShader from source)
      # ──────────────────────────────────────────────────────────────────
      - name: Cache SwiftShader build
        if: runner.os == 'Linux'
        id: cache-swiftshader
        uses: actions/cache@v4
        with:
          path: /tmp/swiftshader
          key: swiftshader-${{ runner.os }}-v1

      - name: Build SwiftShader from source (Linux)
        if: runner.os == 'Linux' && steps.cache-swiftshader.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/google/swiftshader /tmp/swiftshader
          cmake -S /tmp/swiftshader -B /tmp/swiftshader/build \
                -DSWIFTSHADER_BUILD_TESTS=OFF \
                -DREACTOR_BACKEND=Subzero \
                -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/swiftshader/build --target vk_swiftshader -j$(nproc)

      - name: Run rlvk runtime tests (SwiftShader)
        if: runner.os == 'Linux'
        run: |
          export VK_ICD_FILENAMES=/tmp/swiftshader/build/Linux/vk_swiftshader_icd.json
          if [ -f tests/rlvk/Makefile ]; then
            make -C tests/rlvk run
          else
            echo "tests/rlvk not yet present (Task 41 pending) — skipping"
          fi

      # ──────────────────────────────────────────────────────────────────
      # Visual regression (Linux only — needs SwiftShader + ImageMagick)
      # ──────────────────────────────────────────────────────────────────
      - name: Install ImageMagick (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y --no-install-recommends imagemagick

      - name: Visual regression (Linux + SwiftShader)
        if: runner.os == 'Linux'
        run: |
          export VK_ICD_FILENAMES=/tmp/swiftshader/build/Linux/vk_swiftshader_icd.json
          if [ -f tests/visual/run_visual.sh ]; then
            sh tests/visual/run_visual.sh
          else
            echo "tests/visual not yet present (Task 45 pending) — skipping"
          fi
